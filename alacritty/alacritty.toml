[colors.selection]
background = "0x33467c"
text = "0xc0caf5"

[cursor.style]
blinking = "Always"
shape = "Block"

[font]
size = 20.0

[font.bold]
family = "Maple Mono NF"
style = "Bold"

[font.italic]
family = "Maple Mono NF"
style = "Italic"

[font.normal]
family = "Maple Mono NF"
style = "Regular"

[mouse]
hide_when_typing = true

[window]
blur = true
opacity = 0.5
decorations = "Buttonless"

[window.padding]
x = 10
y = 0


