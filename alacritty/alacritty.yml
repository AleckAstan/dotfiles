window:
  opacity: 0.85  # Transparency level (0 = fully transparent, 1 = solid)
  blur: true     # Enables macOS native blur
  padding:
    x: 10
    y: 10

font:
  normal:
    family: "Maple Mono NF"
    style: Regular
  bold:
    family: "Maple Mono NF"
    style: Bold
  italic:
    family: "Maple Mono NF"
    style: Italic
  size: 18.0  # Adjust for your preference

colors:
  # Tokyo Night Night Theme
  primary:
    background: '0x1a1b26'  # Dark blue background
    foreground: '0xc0caf5'  # Light blue text

  cursor:
    text: '0x1a1b26'
    cursor: '0xc0caf5'

  selection:
    text: '0xc0caf5'
    background: '0x33467c'

  normal:
    black:   '0x15161e'
    red:     '0xf7768e'
    green:   '0x9ece6a'
    yellow:  '0xe0af68'
    blue:    '0x7aa2f7'
    magenta: '0xbb9af7'
    cyan:    '0x7dcfff'
    white:   '0xa9b1d6'

  bright:
    black:   '0x414868'
    red:     '0xf7768e'
    green:   '0x9ece6a'
    yellow:  '0xe0af68'
    blue:    '0x7aa2f7'
    magenta: '0xbb9af7'
    cyan:    '0x7dcfff'
    white:   '0xc0caf5'

cursor:
  style:
    shape: Block
    blinking: Always

# shell:
#   program: /bin/zsh  # Change to fish or bash if needed

mouse:
  hide_when_typing: true

key_bindings:
  - { key: V, mods: Command, action: Paste }  # Cmd+V for paste
  - { key: C, mods: Command, action: Copy }   # Cmd+C for copy
  - { key: Return, mods: Command, action: ToggleFullscreen }  # Cmd+Enter fullscreen
